<header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="relative flex items-center justify-between h-16">
      <!-- Left side: Discover + Learn -->
      <nav class="hidden md:flex items-center gap-8 lg:gap-10">
        {% for page in site.header_pages %}
          <a
            href="{{ site.baseurl }}{{ page.url }}"
            class="text-slate-200 hover:text-indigo-400 font-medium transition-colors"
          >
            {{ page.title }}
          </a>
        {% endfor %}
      </nav>

      <!-- Center: Logo / App title -->
      <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
        <a href="{{ site.baseurl }}/" class="text-2xl font-bold text-slate-100 whitespace-nowrap">
          Hackathon<span class="text-indigo-600">Planner</span>
        </a>
      </div>

      <!-- Right side: Login -->
      <div class="flex items-center gap-4">
        <a
          href="/login"
          class="text-slate-200 hover:text-indigo-400 font-medium px-4 py-2 transition"
        >
          Log in
        </a>

        <!-- Optional signup button (you can remove it) -->
        <a
          href="/signup"
          class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition shadow-sm hidden sm:block"
        >
          Sign up
        </a>
      </div>
    </div>
  </div>
</header>
