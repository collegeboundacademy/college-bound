<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
      function handleAuth() {

        if (localStorage.getItem('logged_in') === 'true') {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        console.log('Authorization code from URL:', code);
        if (code) {
          fetch('http://localhost:8080/api/auth/exchange', {
            method: 'POST',
            body: new URLSearchParams({ code: code })
          })
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              document.cookie = `jwtToken=${data.token}; path=/; secure; samesite=strict`;
              localStorage.setItem('logged_in', true);
              window.history.replaceState({}, document.title, window.location.pathname);
              window.location.href = '{{site.baseurl}}/';
            }
          })
          .catch(err => console.error('Auth error:', err));
        }
      }

      // Run immediately if DOM is ready, otherwise wait for the event
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleAuth);
      } else {
        handleAuth();
      }
    </script>

  </head>

  <body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
    {% include header.html %}

    <!-- Main content anchored to top (below the sticky header). Dark slate background with indigo accents. -->
    <main class="bg-slate-800 w-full max-w-4xl mx-auto shadow-lg px-4 sm:px-6 md:px-8 lg:px-10 py-6 sm:py-8 rounded-2xl overflow-hidden border border-slate-700 mt-8 text-slate-100">
      {{ content }}
    </main>
</body>
</html>
