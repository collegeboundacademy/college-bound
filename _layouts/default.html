<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
      function handleAuth() {

        if (localStorage.getItem('logged_in') === 'true') {
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        console.log('Authorization code from URL:', code);
        if (code) {
          fetch('http://localhost:8080/api/auth/exchange', {
            method: 'POST',
            body: new URLSearchParams({ code: code })
          })
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              document.cookie = `jwtToken=${data.token}; path=/; secure; samesite=strict`;
              localStorage.setItem('logged_in', true);
              window.history.replaceState({}, document.title, window.location.pathname);
              window.location.href = '{{site.baseurl}}/';
            }
          })
          .catch(err => console.error('Auth error:', err));
        }
      }

      // Run immediately if DOM is ready, otherwise wait for the event
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleAuth);
      } else {
        handleAuth();
      }
    </script>

  </head>

  <body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
    {% include header.html %}

    <!-- Main content anchored to top (below the sticky header). Dark slate background with indigo accents. -->
    <main class="bg-slate-800 w-full max-w-4xl mx-auto shadow-lg px-4 sm:px-6 md:px-8 lg:px-10 py-6 sm:py-8 rounded-2xl overflow-hidden border border-slate-700 mt-8 text-slate-100">
      {{ content }}
    </main>

  <!-- Floating index shortcut button (always visible) -->
  <a href="{{ '/' | relative_url }}" aria-label="Back to frontpage" title="Frontpage" class="fixed top-20 right-6 z-40 inline-flex items-center justify-center w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3m-6 0h6" />
      </svg>
    </a>
</body>
</html>
