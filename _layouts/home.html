---
layout: default
---

<section class="home">
  {% if site.description %}
    <p class="site-description">{{ site.description }}</p>
  {% endif %}

  <h2>Posts</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: '%B %d, %Y' }}</span>
      </li>
    {% endfor %}
  </ul>

  {{ content }}
</section>
